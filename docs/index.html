<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dixon-Coles — Upcoming Fixtures</title>
<style>
  :root {
    --ink: #0B0F0D;
    --panel: #121A15;
    --panel-2: #16201A;
    --line: #263329;
    --chalk: #E9E6DA;
    --muted: #8FA093;
    --muted-dim: #5D6E62;
    --phosphor: #6FFFA0;
    --phosphor-dim: #3FAE72;
    --brick: #C1512F;
    --font-mono: ui-monospace, "Cascadia Code", "SF Mono", "JetBrains Mono", Consolas, monospace;
    --font-sans: "Segoe UI", ui-sans-serif, system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    background: var(--ink);
    color: var(--chalk);
    font-family: var(--font-sans);
    font-variant-numeric: tabular-nums;
    line-height: 1.5;
  }

  ::selection { background: var(--phosphor-dim); color: var(--ink); }

  button, input { font-family: inherit; color: inherit; }

  :focus-visible { outline: 2px solid var(--phosphor); outline-offset: 2px; }

  a { color: var(--phosphor); }

  .masthead {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 24px;
    border-bottom: 1px solid var(--line);
    font-family: var(--font-mono);
    flex-wrap: wrap;
  }
  .masthead .wordmark { font-size: 15px; font-weight: 700; letter-spacing: 0.12em; }
  .masthead .wordmark span { color: var(--phosphor); }
  .masthead .meta { font-size: 12px; letter-spacing: 0.06em; color: var(--muted); }

  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    min-height: calc(100vh - 60px);
  }
  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* ---------- sidebar ---------- */

  .sidebar {
    border-right: 1px solid var(--line);
    overflow-y: auto;
    max-height: calc(100vh - 60px);
  }
  @media (max-width: 860px) {
    .sidebar { border-right: none; border-bottom: 1px solid var(--line); max-height: 46vh; }
  }

  .date-group .date-head {
    position: sticky;
    top: 0;
    background: var(--ink);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted-dim);
    padding: 12px 20px 8px;
    border-bottom: 1px solid var(--line);
  }

  .fixture-item {
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    border-bottom: 1px solid var(--line);
    padding: 14px 20px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .fixture-item:hover { background: var(--panel); }
  .fixture-item[aria-current="true"] {
    background: var(--panel);
    box-shadow: inset 3px 0 0 var(--phosphor);
  }

  .fixture-item .teams {
    font-size: 14px;
    color: var(--chalk);
  }
  .fixture-item .teams .vs { color: var(--muted-dim); font-family: var(--font-mono); font-size: 11px; margin: 0 6px; }

  .crest {
    display: inline-block;
    vertical-align: -3px;
    margin-right: 6px;
    object-fit: contain;
  }
  .team .name .crest { vertical-align: -5px; margin-right: 10px; }

  .fixture-item .row2 {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }
  .fixture-item .pick { color: var(--phosphor-dim); }

  .empty-note {
    padding: 20px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
  }

  /* ---------- detail ---------- */

  .detail { padding: 32px 28px 60px; overflow-y: auto; }

  .fixture-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted-dim);
    margin: 0 0 16px;
  }

  .matchup {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
  }
  .team { display: flex; flex-direction: column; gap: 4px; }
  .team.away { align-items: flex-end; text-align: right; }
  .team .role {
    font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.12em;
    color: var(--muted-dim); text-transform: uppercase;
  }
  .team .name { font-size: clamp(22px, 4vw, 34px); font-weight: 700; letter-spacing: -0.01em; text-wrap: balance; }
  .team .lambda { font-family: var(--font-mono); font-size: 14px; color: var(--phosphor); }
  .team .lambda em { color: var(--muted); font-style: normal; }
  .vs { font-family: var(--font-mono); font-size: 12px; color: var(--muted-dim); }

  .fixture-footnote {
    margin-top: 16px; font-family: var(--font-mono); font-size: 12px; color: var(--muted);
  }
  .fixture-footnote strong { color: var(--chalk); font-weight: 600; }

  .body-grid {
    display: grid;
    grid-template-columns: minmax(0, 340px) 1fr;
    gap: 32px;
    margin-top: 32px;
    padding-top: 28px;
    border-top: 1px solid var(--line);
  }
  @media (max-width: 700px) { .body-grid { grid-template-columns: 1fr; } }

  .panel-title { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; color: var(--muted-dim); margin: 0 0 4px; }
  .panel-sub { font-size: 13px; color: var(--muted); margin: 0 0 16px; max-width: 44ch; }

  .matrix-wrap { overflow-x: auto; }
  .matrix {
    display: grid; grid-template-columns: 26px repeat(6, 1fr); gap: 3px;
    width: 100%; max-width: 320px;
  }
  .matrix .axis, .matrix .axis-corner {
    font-family: var(--font-mono); font-size: 10.5px; color: var(--muted-dim);
    display: flex; align-items: center; justify-content: center;
  }
  .matrix .axis-row { justify-content: flex-end; padding-right: 4px; }
  .cell {
    aspect-ratio: 1; border-radius: 2px; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 10px; border: 1px solid var(--line);
    background: var(--cell-bg, var(--panel-2)); color: var(--muted);
  }
  .cell.peak { border-color: var(--phosphor); box-shadow: 0 0 0 1px var(--phosphor); font-weight: 700; }

  .top-scores { margin: 18px 0 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 6px; font-family: var(--font-mono); font-size: 12.5px; }
  .top-scores li { display: flex; align-items: baseline; gap: 8px; color: var(--muted); }
  .top-scores .rank { color: var(--muted-dim); width: 1.3em; }
  .top-scores .score { color: var(--chalk); width: 3em; }
  .top-scores .bar-track { flex: 1; height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; }
  .top-scores .bar-fill { height: 100%; background: var(--phosphor-dim); }
  .top-scores li:first-child .bar-fill { background: var(--phosphor); }
  .top-scores .pct { width: 3.4em; text-align: right; color: var(--chalk); }

  /* ---------- odds calculator ---------- */

  .calc-group + .calc-group { margin-top: 24px; }

  .calc-head {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; color: var(--muted-dim);
    padding-bottom: 8px; border-bottom: 1px solid var(--line); margin-bottom: 2px;
    display: grid; grid-template-columns: 1.4fr 1fr repeat(4, 1fr) auto; gap: 8px;
  }
  .calc-head span:not(:first-child) { text-align: right; }

  .calc-row {
    display: grid; grid-template-columns: 1.4fr 1fr repeat(4, 1fr) auto; gap: 8px; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--line); font-family: var(--font-mono); font-size: 12.5px;
  }
  .calc-row:last-child { border-bottom: none; }
  .calc-row .sel { color: var(--chalk); font-family: var(--font-sans); font-size: 13px; }
  .calc-row span:not(.sel):not(.flag) { text-align: right; color: var(--muted); }
  .calc-row .blend { color: var(--chalk); }

  .odds-input {
    width: 100%; background: var(--panel); border: 1px solid var(--line); border-radius: 3px;
    color: var(--chalk); font-family: var(--font-mono); font-size: 12.5px; text-align: right; padding: 4px 6px;
  }
  .odds-input:focus-visible { outline: 2px solid var(--phosphor); outline-offset: 1px; }

  .ev-pos { color: var(--phosphor) !important; }
  .ev-neg { color: var(--brick) !important; }
  .ev-flat { color: var(--muted) !important; }

  .flag {
    justify-self: end; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.05em;
    padding: 2px 6px; border-radius: 3px; background: rgba(111,255,160,0.12); color: var(--phosphor);
    border: 1px solid rgba(111,255,160,0.35); white-space: nowrap;
  }

  .controls {
    display: flex; flex-wrap: wrap; gap: 20px; align-items: center;
    margin: 20px 0 6px; font-family: var(--font-mono); font-size: 12px; color: var(--muted);
  }
  .controls label { display: flex; align-items: center; gap: 8px; }
  .controls input[type="range"] { accent-color: var(--phosphor); }
  .controls input[type="number"] {
    width: 90px; background: var(--panel); border: 1px solid var(--line); border-radius: 3px;
    color: var(--chalk); padding: 4px 6px; font-family: var(--font-mono);
  }
  .controls .trust-val { color: var(--phosphor); }

  .calc-caption { margin-top: 10px; font-family: var(--font-mono); font-size: 11px; color: var(--muted-dim); }

  .loading, .error { padding: 40px; font-family: var(--font-mono); color: var(--muted); }
  .error { color: var(--brick); }
</style>
</head>
<body>

  <header class="masthead">
    <div class="wordmark">DIXON<span>-</span>COLES <span style="color:var(--muted)">// UPCOMING FIXTURES</span></div>
    <div class="meta" id="meta-updated"></div>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar" aria-label="Upcoming fixtures"></nav>
    <main class="detail" id="detail"></main>
  </div>

<script>
(function () {
  var state = { data: null, selectedId: null, trust: 0.5, bankroll: 1000 };

  function stripMargin(odds) {
    var probs = odds.map(function (o) { return 1 / o; });
    var sum = probs.reduce(function (a, b) { return a + b; }, 0);
    return probs.map(function (p) { return p / sum; });
  }
  function blend(modelP, marketP, trust) { return trust * modelP + (1 - trust) * marketP; }
  function expectedValue(p, odds) { return p * (odds - 1) - (1 - p); }
  function kellyFraction(p, odds, mult) {
    mult = mult === undefined ? 0.25 : mult;
    var b = odds - 1;
    var f = (b * p - (1 - p)) / b;
    return Math.max(0, f * mult);
  }
  function pct(x) { return (x * 100).toFixed(1) + '%'; }
  function signedPct(x) { return (x >= 0 ? '+' : '−') + Math.abs(x * 100).toFixed(1) + '%'; }
  function money(x) { return '$' + x.toFixed(2); }

  function crestImg(url, name, size) {
    if (!url) return '';
    return '<img class="crest" src="' + url + '" alt="" width="' + size + '" height="' + size + '" loading="lazy" onerror="this.remove()" />';
  }

  function groupByDate(fixtures) {
    var groups = {};
    fixtures.forEach(function (fx) {
      (groups[fx.date] = groups[fx.date] || []).push(fx);
    });
    return Object.keys(groups).sort().map(function (d) { return { date: d, items: groups[d] }; });
  }

  function formatDate(iso) {
    var d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function renderSidebar() {
    var el = document.getElementById('sidebar');
    if (!state.data.fixtures.length) {
      el.innerHTML = '<p class="empty-note">No upcoming fixtures matched historical data. Run build_site_data.py after fetching new fixtures.</p>';
      return;
    }
    var groups = groupByDate(state.data.fixtures);
    el.innerHTML = groups.map(function (g) {
      var items = g.items.map(function (fx) {
        var favored = fx.p_home > fx.p_away ? fx.home : (fx.p_away > fx.p_home ? fx.away : 'Draw');
        var favoredPct = Math.max(fx.p_home, fx.p_draw, fx.p_away);
        return (
          '<button class="fixture-item" data-id="' + fx.id + '" aria-current="' + (fx.id === state.selectedId) + '">' +
            '<span class="teams">' + crestImg(fx.home_crest, fx.home, 16) + fx.home + '<span class="vs">vs</span>' + crestImg(fx.away_crest, fx.away, 16) + fx.away + '</span>' +
            '<span class="row2"><span>' + (fx.time || '') + '</span><span class="pick">' + favored + ' ' + pct(favoredPct) + '</span></span>' +
          '</button>'
        );
      }).join('');
      return '<div class="date-group"><div class="date-head">' + formatDate(g.date) + '</div>' + items + '</div>';
    }).join('');

    el.querySelectorAll('.fixture-item').forEach(function (btn) {
      btn.addEventListener('click', function () {
        state.selectedId = Number(btn.dataset.id);
        renderSidebar();
        renderDetail();
      });
    });
  }

  function buildMatrixHTML(matrix, topScores) {
    var maxV = Math.max.apply(null, matrix.flat());
    var peak = topScores[0][0];
    var out = '<div class="matrix" role="img" aria-label="Correct score probability matrix">';
    out += '<span class="axis-corner"></span>';
    for (var c = 0; c < 6; c++) out += '<span class="axis">' + c + '</span>';
    for (var i = 0; i < 6; i++) {
      out += '<span class="axis axis-row">' + i + '</span>';
      for (var j = 0; j < 6; j++) {
        var v = matrix[i][j];
        var t = Math.min(1, v / maxV);
        var pctText = v.toFixed(1);
        var isPeak = (i + '-' + j) === peak;
        var textColor = t > 0.45 ? '#0B0F0D' : '#8FA093';
        out += '<span class="cell' + (isPeak ? ' peak' : '') + '" style="--cell-bg: color-mix(in srgb, #6FFFA0 ' + Math.round(t * 100) + '%, #16201A); color:' + textColor + '" title="' + i + '-' + j + ': ' + pctText + '%">' + pctText + '</span>';
      }
    }
    out += '</div>';
    return out;
  }

  function buildTopScoresHTML(topScores) {
    var maxP = topScores[0][1];
    return '<ol class="top-scores" style="list-style:none;padding:0;">' + topScores.map(function (ts, idx) {
      var score = ts[0], p = ts[1];
      var width = Math.round((p / maxP) * 100);
      return '<li><span class="rank">' + (idx + 1) + '</span><span class="score">' + score.replace('-', '–') + '</span><span class="bar-track"><span class="bar-fill" style="width:' + width + '%"></span></span><span class="pct">' + pct(p) + '</span></li>';
    }).join('') + '</ol>';
  }

  function calcRow(label, modelP, oddsId, defaultOdds) {
    return { label: label, modelP: modelP, oddsId: oddsId, defaultOdds: defaultOdds };
  }

  function renderCalcGroup(title, rows, bankroll, trust) {
    var odds = rows.map(function (r) {
      var el = document.getElementById(r.oddsId);
      return (el && Number(el.value)) || r.defaultOdds;
    });
    var overround = odds.reduce(function (a, o) { return a + 1 / o; }, 0) - 1;
    var marketP = stripMargin(odds);

    var head =
      '<div class="calc-head"><span>' + title + ' &middot; overround ' + signedPct(overround).replace('+', '') + '</span>' +
      '<span>ODDS</span><span>MODEL</span><span>MARKET</span><span>BLEND</span><span>EV</span><span></span></div>';

    var body = rows.map(function (r, idx) {
      var mp = marketP[idx];
      var b = blend(r.modelP, mp, trust);
      var ev = expectedValue(b, odds[idx]);
      var stakeFrac = kellyFraction(b, odds[idx]);
      var stake = stakeFrac * bankroll;
      var evClass = ev > 0.02 ? 'ev-pos' : (ev < -0.005 ? 'ev-neg' : 'ev-flat');
      var flag = ev > 0.02 ? '<span class="flag">BET &middot; ' + money(stake) + '</span>' : '<span></span>';
      return (
        '<div class="calc-row">' +
          '<span class="sel">' + r.label + '</span>' +
          '<span><input class="odds-input" type="number" step="0.01" min="1.01" id="' + r.oddsId + '" value="' + odds[idx].toFixed(2) + '" /></span>' +
          '<span>' + pct(r.modelP) + '</span>' +
          '<span>' + pct(mp) + '</span>' +
          '<span class="blend">' + pct(b) + '</span>' +
          '<span class="' + evClass + '">' + signedPct(ev) + '</span>' +
          flag +
        '</div>'
      );
    }).join('');

    return '<div class="calc-group">' + head + body + '</div>';
  }

  function wireCalcInputs(fx) {
    document.querySelectorAll('.odds-input').forEach(function (input) {
      input.addEventListener('input', function () { renderCalculators(fx); });
    });
    var trustSlider = document.getElementById('trust-slider');
    var trustVal = document.getElementById('trust-val');
    var bankrollInput = document.getElementById('bankroll-input');
    if (trustSlider) trustSlider.addEventListener('input', function () {
      state.trust = Number(trustSlider.value);
      trustVal.textContent = state.trust.toFixed(2);
      renderCalculators(fx);
    });
    if (bankrollInput) bankrollInput.addEventListener('input', function () {
      state.bankroll = Number(bankrollInput.value) || 0;
      renderCalculators(fx);
    });
  }

  function renderCalculators(fx) {
    var mount = document.getElementById('calc-mount');
    var scrollX = window.scrollX, scrollY = window.scrollY;
    mount.innerHTML =
      renderCalcGroup('1X2', [
        calcRow('Home', fx.p_home, 'odds-home', 2.0),
        calcRow('Draw', fx.p_draw, 'odds-draw', 3.4),
        calcRow('Away', fx.p_away, 'odds-away', 3.8),
      ], state.bankroll, state.trust) +
      renderCalcGroup('Totals 2.5', [
        calcRow('Over 2.5', fx.p_over_2_5, 'odds-over', 2.0),
        calcRow('Under 2.5', fx.p_under_2_5, 'odds-under', 1.8),
      ], state.bankroll, state.trust) +
      '<p class="calc-caption">bankroll $' + state.bankroll.toFixed(0) + ' &middot; trust ' + state.trust.toFixed(2) + ' &middot; quarter-Kelly &middot; edit odds above, everything recomputes live</p>';
    wireCalcInputs(fx);
    window.scrollTo(scrollX, scrollY);
  }

  function renderDetail() {
    var el = document.getElementById('detail');
    var fx = state.data.fixtures.find(function (f) { return f.id === state.selectedId; });
    if (!fx) {
      el.innerHTML = '<p class="loading">Select a fixture from the list.</p>';
      return;
    }
    el.innerHTML =
      '<p class="fixture-eyebrow">' + (fx.competition || 'FIXTURE') + ' &middot; ' + formatDate(fx.date) + (fx.time ? ' &middot; ' + fx.time : '') + '</p>' +
      '<div class="matchup">' +
        '<div class="team home"><span class="role">Home</span><span class="name">' + crestImg(fx.home_crest, fx.home, 28) + fx.home + '</span><span class="lambda">&lambda; ' + fx.lambda_home.toFixed(2) + ' <em>xG/90</em></span></div>' +
        '<span class="vs">vs</span>' +
        '<div class="team away"><span class="role">Away</span><span class="name">' + crestImg(fx.away_crest, fx.away, 28) + fx.away + '</span><span class="lambda">&lambda; ' + fx.lambda_away.toFixed(2) + ' <em>xG/90</em></span></div>' +
      '</div>' +
      '<p class="fixture-footnote">home advantage <strong>' + (fx.home_adv >= 0 ? '+' : '') + fx.home_adv.toFixed(2) + '</strong> &middot; low-score correction &rho; <strong>' + fx.rho.toFixed(3) + '</strong> &middot; fair odds H/D/A <strong>' + fx.fair_odds.home + ' / ' + fx.fair_odds.draw + ' / ' + fx.fair_odds.away + '</strong></p>' +
      '<div class="body-grid">' +
        '<div>' +
          '<p class="panel-title">CORRECT SCORE &mdash; PROBABILITY MATRIX</p>' +
          '<p class="panel-sub">Rows: ' + fx.home + ' goals. Columns: ' + fx.away + ' goals.</p>' +
          '<div class="matrix-wrap">' + buildMatrixHTML(fx.matrix, fx.top_scores) + '</div>' +
          buildTopScoresHTML(fx.top_scores) +
        '</div>' +
        '<div>' +
          '<p class="panel-title">MARKET vs MODEL</p>' +
          '<p class="panel-sub">Type in the market’s decimal odds &mdash; blend, EV, and quarter-Kelly stake recompute live.</p>' +
          '<div class="controls">' +
            '<label>trust <input type="range" id="trust-slider" min="0" max="1" step="0.05" value="' + state.trust + '" /><span class="trust-val" id="trust-val">' + state.trust.toFixed(2) + '</span></label>' +
            '<label>bankroll <input type="number" id="bankroll-input" value="' + state.bankroll + '" step="50" /></label>' +
          '</div>' +
          '<div id="calc-mount"></div>' +
        '</div>' +
      '</div>';
    renderCalculators(fx);
  }

  fetch('./data.json')
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function (data) {
      state.data = data;
      state.selectedId = data.fixtures.length ? data.fixtures[0].id : null;
      document.getElementById('meta-updated').textContent = 'generated ' + new Date(data.generated_at).toLocaleString();
      renderSidebar();
      renderDetail();
    })
    .catch(function (err) {
      document.getElementById('sidebar').innerHTML = '';
      document.getElementById('detail').innerHTML =
        '<p class="error">Could not load data.json (' + err.message + '). ' +
        'Run build_site_data.py first, and serve this folder with a local server ' +
        '(e.g. <code>python -m http.server</code> from the site/ folder) &mdash; ' +
        'opening index.html directly as a file:// URL blocks the fetch.</p>';
    });
})();
</script>
</body>
</html>
